<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - A1VIP KORA CODE</title>
  <style>
    :root{--bg:#03100b;--green:#09f26c;--gold:#f4b400;--text:#f7f7f7}
    *{box-sizing:border-box} body{margin:0;font-family:Tahoma,Arial,sans-serif;background:radial-gradient(circle at 50% 20%,#0f261d 0,#06110d 25%,#020906 65%,#010403 100%);color:var(--text)}
    .wrap{max-width:760px;margin:0 auto;padding:20px 16px 40px}.card{border-radius:28px;background:linear-gradient(180deg,#0a1813,#050907);border:1px solid rgba(9,242,108,.18);box-shadow:0 0 30px rgba(9,242,108,.08);padding:22px 16px;margin-bottom:18px}
    h1,h2,p{margin:0}.title{text-align:center;font-size:36px;font-weight:900;margin-bottom:8px}.muted{text-align:center;color:#a8b0a9;line-height:1.8}.label{display:block;margin:16px 0 8px;font-size:18px;color:#bef4cf}.input,.select,.textarea{width:100%;padding:16px;border-radius:18px;border:1px solid rgba(9,242,108,.18);background:#09110d;color:#fff;font-size:18px}.textarea{min-height:100px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.btn{width:100%;border:none;border-radius:18px;padding:16px;font-size:20px;font-weight:900;cursor:pointer;margin-top:14px}.btn.green{background:linear-gradient(180deg,#08eb5c,#05c34d);color:#032d15}.btn.gold{background:linear-gradient(180deg,#f8c000,#e7ab00);color:#111}.btn.red{background:linear-gradient(180deg,#ff6868,#dd3131);color:#fff}.btn.dark{background:#151a17;color:#fff;border:1px solid rgba(255,255,255,.12)}
    .hidden{display:none}.item{padding:16px;border-radius:20px;background:#07100c;border:1px solid rgba(9,242,108,.14);margin-top:12px}.item .top{display:flex;justify-content:space-between;gap:10px;align-items:center}.code{font-size:28px;color:#11f06a;font-weight:900;letter-spacing:4px}.status{padding:8px 14px;border-radius:999px;font-size:15px;font-weight:900}.active{background:#10361e;color:#8df3b5}.won{background:#3d3008;color:#ffd54b}.lost{background:#3d1010;color:#ff9999}.thumb{margin-top:12px;width:100%;border-radius:16px;max-height:260px;object-fit:cover;background:#fff}.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}.actions button{padding:12px 8px;border-radius:14px;border:none;font-weight:900;cursor:pointer}.small{font-size:14px;color:#97a198;margin-top:6px}.login{min-height:100vh;display:grid;place-items:center;padding:16px}.login-box{max-width:520px;width:100%}
    @media (max-width:600px){.row,.actions{grid-template-columns:1fr 1fr}.title{font-size:28px}.code{font-size:22px}}
  </style>
</head>
<body>
  <div id="loginScreen" class="login">
    <div class="login-box card">
      <div class="title">لوحة الإدارة</div>
      <p class="muted">أدخل كلمة السر للوصول إلى صفحة الإدارة</p>
      <label class="label">كلمة السر</label>
      <input id="passwordInput" class="input" type="password" placeholder="اكتب كلمة السر" />
      <button class="btn gold" onclick="login()">دخول</button>
      <div id="loginError" class="small" style="color:#ff9c9c;display:none">كلمة السر غير صحيحة</div>
    </div>
  </div>

  <div id="adminApp" class="hidden">
    <div class="wrap">
      <div class="card">
        <div class="title">A1VIP KORA CODE - Admin</div>
        <p class="muted">من هنا تقدر تضيف الأكواد وتعدل حالتها وتحدد الأكواد الرابحة أو الخاسرة.</p>
        <button class="btn dark" onclick="logout()">تسجيل خروج</button>
      </div>

      <div class="card">
        <h2 style="margin-bottom:10px">إضافة / تعديل كود</h2>
        <input type="hidden" id="editId" />
        <label class="label">الكود</label>
        <input id="code" class="input" placeholder="مثال: DQU6X" />
        <div class="row">
          <div>
            <label class="label">نسبة الربح</label>
            <input id="odds" class="input" type="number" step="0.01" placeholder="1.66" />
          </div>
          <div>
            <label class="label">الحالة</label>
            <select id="status" class="select">
              <option value="active">متاح</option>
              <option value="won">رابح</option>
              <option value="lost">خاسر</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div>
            <label class="label">تاريخ الكود</label>
            <input id="date" class="input" type="date" />
          </div>
          <div>
            <label class="label">رابط الصورة</label>
            <input id="screenshot" class="input" placeholder="https://..." />
          </div>
        </div>
        <label class="label">كلام الشرح داخل الكود المتاح</label>
        <textarea id="note1" class="textarea" placeholder="النص الأول"></textarea>
        <label class="label">كلام الشرح الثاني</label>
        <textarea id="note2" class="textarea" placeholder="النص الثاني"></textarea>
        <div class="row">
          <button class="btn green" onclick="saveCode()">حفظ الكود</button>
          <button class="btn dark" onclick="resetForm()">تفريغ الحقول</button>
        </div>
      </div>

      <div class="card">
        <h2>كل الأكواد</h2>
        <div id="list"></div>
      </div>
    </div>
  </div>

  <script>
    const PASS='AbanoubSamirRANDAHANY907&ANGLIabanoub907@#$';
    const authKey='a1vip_admin_auth';
    const storageKey='a1vip_codes_v2';
    function today(){return new Date().toISOString().slice(0,10)}
    function getCodes(){try{return JSON.parse(localStorage.getItem(storageKey)||'[]')}catch{return []}}
    function setCodes(v){
      const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-30);
      const filtered=v.filter(x=> !x.date || new Date(x.date)>=cutoff || x.status!=='won');
      localStorage.setItem(storageKey, JSON.stringify(filtered));
    }
    function check(){
      const ok=localStorage.getItem(authKey)==='1';
      document.getElementById('loginScreen').classList.toggle('hidden',ok);
      document.getElementById('adminApp').classList.toggle('hidden',!ok);
      if(ok){document.getElementById('date').value=today(); render();}
    }
    function login(){
      if(document.getElementById('passwordInput').value===PASS){localStorage.setItem(authKey,'1');check();}
      else document.getElementById('loginError').style.display='block';
    }
    function logout(){localStorage.removeItem(authKey); location.reload();}
    function resetForm(){['editId','code','odds','screenshot','note1','note2'].forEach(id=>document.getElementById(id).value=''); document.getElementById('status').value='active'; document.getElementById('date').value=today();}
    function saveCode(){
      const codes=getCodes();
      const id=document.getElementById('editId').value;
      const item={
        id: id? Number(id): Date.now(),
        code: document.getElementById('code').value.trim(),
        odds: Number(document.getElementById('odds').value||0),
        status: document.getElementById('status').value,
        date: document.getElementById('date').value || today(),
        screenshot: document.getElementById('screenshot').value.trim(),
        note1: document.getElementById('note1').value.trim(),
        note2: document.getElementById('note2').value.trim(),
        wonAt: document.getElementById('status').value==='won'? new Date().toISOString(): null,
      };
      if(!item.code || !item.odds){alert('اكتب الكود ونسبة الربح'); return}
      const idx=codes.findIndex(c=>c.id===item.id);
      if(idx>-1) codes[idx]=item; else codes.unshift(item);
      setCodes(codes); resetForm(); render(); alert('تم الحفظ');
    }
    function editCode(id){
      const c=getCodes().find(x=>x.id===id); if(!c)return;
      document.getElementById('editId').value=c.id; document.getElementById('code').value=c.code||''; document.getElementById('odds').value=c.odds||''; document.getElementById('status').value=c.status||'active'; document.getElementById('date').value=c.date||today(); document.getElementById('screenshot').value=c.screenshot||''; document.getElementById('note1').value=c.note1||''; document.getElementById('note2').value=c.note2||''; window.scrollTo({top:0,behavior:'smooth'});
    }
    function setStatus(id,status){const codes=getCodes(); const i=codes.findIndex(c=>c.id===id); if(i<0)return; codes[i].status=status; if(status==='won')codes[i].wonAt=new Date().toISOString(); setCodes(codes); render();}
    function removeCode(id){ if(!confirm('حذف الكود؟'))return; setCodes(getCodes().filter(c=>c.id!==id)); render(); }
    function render(){
      const codes=getCodes().sort((a,b)=>new Date(b.date)-new Date(a.date));
      document.getElementById('list').innerHTML = codes.length? codes.map(c=>`
        <div class="item">
          <div class="top"><div class="code">${c.code}</div><div class="status ${c.status}">${c.status==='active'?'متاح':c.status==='won'?'رابح':'خاسر'}</div></div>
          <div class="small">التاريخ: ${c.date || '—'} | الربح: x${Number(c.odds||0).toFixed(2)}</div>
          ${c.screenshot?`<img class="thumb" src="${c.screenshot}">`:''}
          <div class="actions">
            <button onclick="editCode(${c.id})">تعديل</button>
            <button onclick="setStatus(${c.id},'active')">متاح</button>
            <button onclick="setStatus(${c.id},'won')">رابح</button>
            <button onclick="setStatus(${c.id},'lost')">خاسر</button>
          </div>
          <button class="btn red" onclick="removeCode(${c.id})">حذف نهائي</button>
        </div>`).join('') : '<div class="small">لا توجد أكواد حالياً</div>';
    }
    check();
  </script>
</body>
</html>
