<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الإدارة - A1VIP KORA CODE</title>
  <meta name="theme-color" content="#030a08" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="admin">
  <header class="site-header">
    <div class="container header-wrap">
      <div class="brand">
        <div class="brand-logo"><span>⚙️</span></div>
        <div class="brand-text">
          <div class="main">A1VIP <span class="green">ADMIN</span></div>
          <span class="sub">PANEL</span>
        </div>
      </div>
      <div style="font-size:24px;color:#94a39b;font-weight:800">/admin.html</div>
    </div>
  </header>
  <main class="page admin-wrap">
    <div class="container">
      <div class="admin-box login-box" id="loginBox">
        <div class="section-head">
          <h1 class="section-title glow-green">تسجيل دخول الإدارة</h1>
          <p class="section-subtitle">الدخول يتم فقط من خلال الرابط المباشر للصفحة</p>
        </div>
        <div class="form-row">
          <label>كلمة السر</label>
          <input class="input" id="adminPass" type="password" placeholder="اكتب كلمة السر" />
        </div>
        <div class="admin-actions" style="margin-top:16px">
          <button class="btn btn-main btn-gold" id="loginBtn">دخول</button>
        </div>
      </div>

      <div class="hidden" id="adminPanel">
        <div class="admin-box">
          <div class="section-head">
            <h1 class="section-title glow-green">إضافة / تعديل الأكواد</h1>
            <p class="section-subtitle">أضف الأكواد المتاحة أو حوّلها إلى رابحة من هنا</p>
          </div>
          <form id="codeForm" class="form-grid">
            <div class="form-row">
              <label>الكود</label>
              <input class="input" id="tipCode" required placeholder="مثال: DQU6X" />
            </div>
            <div class="form-row">
              <label>نسبة الربح</label>
              <input class="input" id="odds" required placeholder="مثال: 1.66" />
            </div>
            <div class="form-row">
              <label>تاريخ الكود</label>
              <input class="input" id="dayDate" type="date" />
            </div>
            <div class="form-row">
              <label>الحالة</label>
              <select class="select" id="status">
                <option value="active">متاح</option>
                <option value="won">رابح</option>
                <option value="lost">خاسر</option>
              </select>
            </div>
            <div class="form-row">
              <label>ملاحظة أسفل الكود</label>
              <textarea class="textarea" id="note" placeholder="مثال: الكود يشتغل على الناس المسجلة ببروموكود A1VIP فقط"></textarea>
            </div>
            <div class="form-row">
              <label>صورة الكود</label>
              <input class="input" id="codeImageFile" type="file" accept="image/*" />
            </div>
            <div class="form-row">
              <label>صورة إثبات الربح</label>
              <input class="input" id="proofImageFile" type="file" accept="image/*" />
            </div>
            <div class="admin-actions">
              <button class="btn btn-main btn-gold" type="submit" id="submitLabel">إضافة الكود</button>
              <button class="btn btn-main btn-dark" type="button" id="logoutBtn">تسجيل خروج</button>
            </div>
          </form>
        </div>

        <div class="section"></div>

        <div class="admin-box">
          <div class="section-head">
            <h2 class="section-title">كل الأكواد</h2>
            <p class="section-subtitle">تعديل، تحويل لرابح، أو حذف</p>
          </div>
          <div class="admin-list" id="adminList"></div>
        </div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
